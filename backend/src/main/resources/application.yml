spring:
  application:
    name: announcement-tracker
  profiles:
    active: dev
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:dummy-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:dummy-client-secret}
            scope:
              - email
              - profile

# Login whitelist: empty = dev mode (every authenticated Google user passes),
# non-empty = only listed addresses, everyone else gets 403.
app:
  security:
    allowed-emails: []
    # Emails granted the ADMIN role on login (e.g. duplicate merge); everyone else is USER.
    admin-emails: []
  scraper:
    max-pages-per-criteria: 5
    delay-min-seconds: 3
    delay-max-seconds: 8
    window-start: "22:00"
    window-duration-minutes: 360
    olx:
      base-url: https://www.olx.pl/api/partner
      access-token: ${OLX_ACCESS_TOKEN:}
      api-version: "2.0"
      page-size: 50

---
# --- dev profile: H2 in-memory, Flyway disabled, schema generated from entities (create-drop) ---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:h2:mem:tracker;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console
  flyway:
    enabled: false

---
# --- prod profile: PostgreSQL + Flyway (env-driven values) ---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DB_URL:jdbc:postgresql://postgres:5432/tracker}
    username: ${DB_USERNAME:tracker}
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
