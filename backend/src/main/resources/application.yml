spring:
  application:
    name: announcement-tracker
  datasource:
    # Local dev points at the Compose Postgres on localhost; Compose overrides DB_URL with the
    # internal hostname, tests get their URL from Testcontainers.
    url: ${DB_URL:jdbc:postgresql://localhost:5432/tracker}
    username: ${DB_USERNAME:tracker}
    password: ${DB_PASSWORD:tracker}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:dummy-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:dummy-client-secret}
            scope:
              - email
              - profile

# Behind the nginx reverse proxy: honour X-Forwarded-* so OAuth2 redirect URIs
# (Google callback) use the external host/scheme, not the internal container address.
server:
  forward-headers-strategy: framework

# Login whitelist: empty = dev mode (every authenticated Google user passes),
# non-empty = only listed addresses, everyone else gets 403.
app:
  security:
    allowed-emails: []
    # Emails granted the ADMIN role on login (e.g. duplicate merge); everyone else is USER.
    admin-emails: []
  scraper:
    max-pages-per-criteria: 5
    delay-min-seconds: 3
    delay-max-seconds: 8
    window-start: "22:00"
    window-duration-minutes: 360
    olx:
      base-url: https://www.olx.pl/api/partner
      access-token: ${OLX_ACCESS_TOKEN:}
      api-version: "2.0"
      page-size: 50
