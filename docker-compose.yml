# Pełne środowisko: postgres + backend + frontend (nginx).
# Sekrety wyłącznie przez zmienne środowiskowe (patrz .env.example).
# Dane Postgresa na named volume.
#
# UWAGA: Dockerfile'e dla backend/frontend powstaną w osobnym kroku.
# Do walidacji samej bazy wystarczy: docker compose up -d postgres

services:
  postgres:
    image: postgres:16
    container_name: tracker-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tracker}
      POSTGRES_USER: ${POSTGRES_USER:-tracker}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD jest wymagane}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tracker} -d ${POSTGRES_DB:-tracker}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: tracker-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-tracker}
      DB_USERNAME: ${POSTGRES_USER:-tracker}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD jest wymagane}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:?GOOGLE_CLIENT_ID jest wymagane}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:?GOOGLE_CLIENT_SECRET jest wymagane}
    ports:
      - "${BACKEND_PORT:-8080}:8080"

  frontend:
    build:
      context: ./frontend
    container_name: tracker-frontend
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-80}:80"

volumes:
  postgres-data:
