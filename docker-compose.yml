# Full environment: postgres + backend + frontend (nginx).
# Secrets only via environment variables (see .env.example).
# Postgres data on a named volume.
#
#   cp .env.example .env   # then fill in POSTGRES_PASSWORD and Google OAuth creds
#   docker compose up -d --build
#
# Frontend: http://localhost:${FRONTEND_PORT:-80}  (proxies /api, /oauth2, /login to backend)
# Logging in requires real GOOGLE_CLIENT_ID/SECRET; without them the stack still boots.

services:
  postgres:
    image: postgres:16
    container_name: tracker-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tracker}
      POSTGRES_USER: ${POSTGRES_USER:-tracker}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tracker} -d ${POSTGRES_DB:-tracker}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: tracker-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-tracker}
      DB_USERNAME: ${POSTGRES_USER:-tracker}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      # Optional locally: stack boots without these, but Google login needs them.
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-dummy-client-id}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-dummy-client-secret}
      OLX_ACCESS_TOKEN: ${OLX_ACCESS_TOKEN:-}
    ports:
      - "${BACKEND_PORT:-8080}:8080"

  frontend:
    build:
      context: ./frontend
    container_name: tracker-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-80}:80"

volumes:
  postgres-data:
