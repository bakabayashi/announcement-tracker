# Serves the Angular SPA and proxies auth/API traffic to the backend container.
# Backend is reachable as the compose service name "backend" on port 8080.

upstream backend {
    server backend:8080;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # API, OAuth2 login handshake and logout go to the backend.
    # Forwarded headers let Spring build correct external redirect URIs (Google callback).
    location ~ ^/(api|oauth2|login|logout) {
        proxy_pass http://backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  $server_port;

        # Server-Sent Events (notifications stream) must not be buffered.
        proxy_buffering off;
        proxy_read_timeout 3600s;
    }

    # SPA client-side routing: fall back to index.html for unknown paths.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
